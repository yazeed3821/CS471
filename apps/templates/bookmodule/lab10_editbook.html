{% extends "layouts/base.html" %}
{% block content %}
<h2>Edit Book: {{ obj.title }}</h2>
<form method="POST">
    {% csrf_token %}
    <label>Title:</label><br>
    <input type="text" name="title" value="{{ obj.title }}" required><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ obj.price }}" required><br><br>

    <label>Edition:</label><br>
    <input type="number" name="edition" value="{{ obj.edition }}" required><br><br>

    <button type="submit">Update Book</button>
    <a href="{% url 'lab10_listbooks' %}">Cancel</a>
</form>
{% endblock %}
